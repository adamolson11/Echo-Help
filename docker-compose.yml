version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ECHOHELP_DB_PATH=/app/data/echohelp.db
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    environment:
      - VITE_API_BASE=http://backend:8000
    depends_on:
      - backend
